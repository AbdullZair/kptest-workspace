# Test Configuration for KPTESTPRO Backend
# Used for integration tests with TestContainers

spring:
  application:
    name: kptest-test

  # DataSource - configured dynamically by TestContainers via @DynamicPropertySource
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway for database migrations - disabled for @WebMvcTest
  flyway:
    enabled: false

  # Redis - configured dynamically by TestContainers
  data:
    redis:
      host: localhost
      port: 6379

  # Email configuration for tests
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Security configuration
kptest:
  security:
    max-login-attempts: 5
    lockout-duration-minutes: 30

  # JWT configuration for tests
  jwt:
    secret: test-jwt-secret-key-for-testing-purposes-only-min-256-bits-required
    expiration-ms: 3600000  # 1 hour
    refresh-expiration-ms: 604800000  # 7 days
    issuer: kptest-test

# OpenAPI/Swagger documentation
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logging configuration
logging:
  level:
    root: WARN
    com.kptest: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.testcontainers: INFO
    org.testcontainers.containers: INFO

# Actuator endpoints for tests
management:
  endpoints:
    web:
      exposure:
        include: health,info
