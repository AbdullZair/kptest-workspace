spring:
  config:
    activate:
      on-profile: dev
  
  flyway:
    enabled: false
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.kptest: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
    com.kptest.api.controller: DEBUG

kptest:
  jwt:
    secret: dev-secret-key-for-development-only-not-for-production-use

  his:
    # Wewnątrz docker-compose his-mock jest dostępny po nazwie usługi.
    # Override przez HIS_BASE_URL=http://localhost:8081 dla lokalnego dev poza kontenerem.
    base-url: ${HIS_BASE_URL:http://his-mock:8081}
    api-key: ${HIS_API_KEY:dev-api-key}
