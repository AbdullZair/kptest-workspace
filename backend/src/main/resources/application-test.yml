spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:tc:postgresql:15://localhost/test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  
  flyway:
    enabled: false
  
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: WARN
    com.kptest: DEBUG

kptest:
  jwt:
    secret: test-secret-key-for-unit-tests-only
  his:
    base-url: http://localhost:8081
    fallback-enabled: true
