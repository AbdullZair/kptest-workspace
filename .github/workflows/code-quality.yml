name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Run Spotless check
        run: |
          cd backend
          ./gradlew spotlessCheck --no-daemon || echo "Spotless not configured, skipping..."

      - name: Run dependency check
        run: |
          cd backend
          ./gradlew dependencyCheckAnalyze --no-daemon || echo "Dependency check not configured, skipping..."

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dependency-report
          path: backend/build/reports/dependency-check/
          retention-days: 7

  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run Prettier check
        run: |
          cd frontend
          npm run format:check

      - name: Run audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || echo "Audit found vulnerabilities, review required"

  mobile-quality:
    name: Mobile Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Run ESLint
        run: |
          cd mobile
          npm run lint

      - name: Run audit
        run: |
          cd mobile
          npm audit --audit-level=moderate || echo "Audit found vulnerabilities, review required"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java,javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java,javascript"
