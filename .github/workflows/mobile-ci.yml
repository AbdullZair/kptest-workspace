name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Run linter
        run: |
          cd mobile
          npm run lint

      - name: Run type check
        run: |
          cd mobile
          npm run type-check

      - name: Run tests
        run: |
          cd mobile
          npm run test -- --watchAll=false --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 7

  eas-build:
    name: EAS Build Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Validate EAS configuration
        run: |
          cd mobile
          eas build:configure --platform android --non-interactive || echo "EAS config validation skipped - configure credentials"

      - name: Check build configuration
        run: |
          cd mobile
          npx expo-doctor

      - name: Upload build artifacts info
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-info
          path: |
            mobile/eas.json
            mobile/app.json
          retention-days: 7
