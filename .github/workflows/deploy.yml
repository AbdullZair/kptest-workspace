name: Deploy to Kubernetes

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend
  KUBE_NAMESPACE: kptest

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Full version: $VERSION"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl config view

      - name: Create namespace if not exists
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          
          # Update backend image in deployment
          kubectl set image deployment/kptest-backend \
            kptest-backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }} \
            -n ${{ env.KUBE_NAMESPACE }}
          
          # Apply backend deployment manifest
          kubectl apply -f devops/k8s/backend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Deploy frontend
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          
          # Update frontend image in deployment
          kubectl set image deployment/kptest-frontend \
            kptest-frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }} \
            -n ${{ env.KUBE_NAMESPACE }}
          
          # Apply frontend deployment manifest
          kubectl apply -f devops/k8s/frontend-deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Wait for backend rollout
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl rollout status deployment/kptest-backend -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Wait for frontend rollout
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl rollout status deployment/kptest-frontend -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Backend health check
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          
          # Get backend service URL
          BACKEND_URL=$(kubectl get service kptest-backend -n ${{ env.KUBE_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          
          if [ "$BACKEND_URL" != "pending" ] && [ -n "$BACKEND_URL" ]; then
            for i in {1..10}; do
              if curl -sf "http://$BACKEND_URL/actuator/health"; then
                echo "Backend is healthy!"
                exit 0
              fi
              echo "Waiting for backend... attempt $i"
              sleep 10
            done
            echo "Backend health check failed"
            exit 1
          else
            echo "Service IP not available yet, skipping external health check"
          fi

      - name: Frontend health check
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          
          # Get frontend service URL
          FRONTEND_URL=$(kubectl get service kptest-frontend -n ${{ env.KUBE_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          
          if [ "$FRONTEND_URL" != "pending" ] && [ -n "$FRONTEND_URL" ]; then
            for i in {1..10}; do
              if curl -sf "http://$FRONTEND_URL"; then
                echo "Frontend is healthy!"
                exit 0
              fi
              echo "Waiting for frontend... attempt $i"
              sleep 10
            done
            echo "Frontend health check failed"
            exit 1
          else
            echo "Service IP not available yet, skipping external health check"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -f kubeconfig
