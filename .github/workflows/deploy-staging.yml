name: Deploy to Staging

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
    types: [closed]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend
  KUBE_NAMESPACE: kptest-staging
  CLUSTER_NAME: kptest-staging-cluster

jobs:
  # Build and push images
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate version
        id: version
        run: |
          VERSION="staging-$(date +%Y%m%d)-${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: ${{ steps.version.outputs.version }}
          retention-days: 1

  # Deploy to Kubernetes staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: staging
      url: https://staging.kptest.example.com
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: version

      - name: Read version
        id: get-version
        run: echo "version=$(cat version)" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl config view

      - name: Create namespace if not exists
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          
          # Apply namespace and RBAC
          kubectl apply -f devops/k8s/production/namespace.yaml
          kubectl apply -f devops/k8s/production/rbac.yaml
          kubectl apply -f devops/k8s/production/resource-quota.yaml
          kubectl apply -f devops/k8s/production/limit-range.yaml
          
          # Apply ConfigMaps
          kubectl apply -f devops/k8s/production/backend-configmap.yaml
          kubectl apply -f devops/k8s/production/frontend-configmap.yaml
          
          # Apply Secrets (from template - update with staging values)
          # kubectl apply -f devops/k8s/production/secrets-staging.yaml
          
          # Deploy backend with new image
          sed "s|image:.*backend:.*|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.get-version.outputs.version }}|" \
            devops/k8s/production/backend-deployment.yaml | kubectl apply -f -
          
          # Deploy frontend with new image
          sed "s|image:.*frontend:.*|image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.get-version.outputs.version }}|" \
            devops/k8s/production/frontend-deployment.yaml | kubectl apply -f -
          
          # Apply other resources
          kubectl apply -f devops/k8s/production/services.yaml
          kubectl apply -f devops/k8s/production/backend-hpa.yaml
          kubectl apply -f devops/k8s/production/frontend-hpa.yaml
          kubectl apply -f devops/k8s/production/backend-pdb.yaml
          kubectl apply -f devops/k8s/production/frontend-pdb.yaml
          kubectl apply -f devops/k8s/production/network-policies.yaml
          kubectl apply -f devops/k8s/production/ingress.yaml

      - name: Wait for backend rollout
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl rollout status deployment/kptest-backend -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Wait for frontend rollout
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          kubectl rollout status deployment/kptest-frontend -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Run smoke tests
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          
          # Get service URLs
          BACKEND_URL=$(kubectl get service kptest-backend -n ${{ env.KUBE_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          FRONTEND_URL=$(kubectl get service kptest-frontend -n ${{ env.KUBE_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          
          echo "Backend URL: $BACKEND_URL"
          echo "Frontend URL: $FRONTEND_URL"
          
          # Health check backend
          if [ "$BACKEND_URL" != "pending" ] && [ -n "$BACKEND_URL" ]; then
            for i in {1..10}; do
              if curl -sf "http://$BACKEND_URL/actuator/health"; then
                echo "Backend is healthy!"
                break
              fi
              echo "Waiting for backend... attempt $i"
              sleep 10
            done
          fi
          
          # Health check frontend
          if [ "$FRONTEND_URL" != "pending" ] && [ -n "$FRONTEND_URL" ]; then
            for i in {1..10}; do
              if curl -sf "http://$FRONTEND_URL"; then
                echo "Frontend is healthy!"
                break
              fi
              echo "Waiting for frontend... attempt $i"
              sleep 10
            done
          fi

      - name: Cleanup
        if: always()
        run: rm -f kubeconfig version

  # Integration tests after deployment
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install test dependencies
        run: |
          cd tests
          npm ci

      - name: Run E2E tests against staging
        env:
          BASE_URL: https://staging.kptest.example.com
          API_URL: https://staging-api.kptest.example.com
        run: |
          cd tests
          npm run test:e2e -- --reporter=spec

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: tests/test-results/
          retention-days: 7

  # Notify deployment status
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-images, deploy-staging, integration-tests]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Staging Deployment ${{ needs.deploy-staging.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Status*\nEnvironment: Staging\nVersion: ${{ needs.build-images.outputs.version }}\nStatus: ${{ needs.deploy-staging.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}\nIntegration Tests: ${{ needs.integration-tests.result == 'success' && '✅ PASSED' || '❌ FAILED' }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
