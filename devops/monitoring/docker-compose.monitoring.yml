# Local monitoring stack for KPTEST.
# Uses prometheus-local.yml (static_configs) instead of prometheus.yml (K8s SD)
# because the production prometheus.yml relies on Kubernetes service discovery
# which only works inside a Kubernetes cluster.
#
# Run:  docker compose -f docker-compose.monitoring.yml up -d
# Stop: docker compose -f docker-compose.monitoring.yml down
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: kptest-prometheus
    volumes:
      - ./prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    network_mode: host
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: kptest-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/kptest.json:ro
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3001
    ports:
      - "3001:3001"
    network_mode: host
    restart: unless-stopped
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kptest-alertmanager
    volumes:
      - ./alertmanager-local.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    network_mode: host
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
