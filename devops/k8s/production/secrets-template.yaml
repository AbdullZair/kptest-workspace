# SECRETS TEMPLATE - DO NOT COMMIT WITH REAL VALUES
# Use external secrets management (Sealed Secrets, External Secrets Operator, Vault)
# 
# To create secrets in production:
# 1. Use Sealed Secrets: kubeseal < secret.yaml > sealed-secret.yaml
# 2. Or use External Secrets Operator with AWS Secrets Manager / GCP Secret Manager / HashiCorp Vault
# 3. Or apply directly with kubectl create secret (not recommended for GitOps)
#
# Example with Sealed Secrets:
# kubectl create secret generic kptest-secrets \
#   --from-literal=db-password='CHANGE_ME' \
#   --from-literal=jwt-secret='CHANGE_ME' \
#   --namespace kptest-production --dry-run=client -o yaml | kubeseal > sealed-secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: kptest-secrets
  namespace: kptest-production
  labels:
    app: kptest
    environment: production
  annotations:
    description: "Production secrets for KPTEST application"
    # If using External Secrets Operator
    # external-secrets.io/provider: aws-secretsmanager
type: Opaque
stringData:
  # Database Credentials
  DB_HOST: "kptest-postgres-production.kptest-production.svc.cluster.local"
  DB_NAME: "kptest"
  DB_USER: "kptest"
  DB_PASSWORD: "CHANGE_ME_USE_STRONG_PASSWORD"
  
  # JWT Configuration
  JWT_SECRET: "CHANGE_ME_USE_STRONG_RANDOM_KEY_MIN_256_BITS"
  
  # Email Configuration
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "CHANGE_ME"
  MAIL_PASSWORD: "CHANGE_ME"
  
  # HIS Integration
  HIS_BASE_URL: "https://his.example.com/api"
  HIS_API_KEY: "CHANGE_ME"
  
  # Redis (optional password)
  REDIS_PASSWORD: ""
  
  # S3 Backup Configuration
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_REGION: "eu-central-1"
  S3_BACKUP_BUCKET: "kptest-backups-production"

---
# Image Pull Secret for GitHub Container Registry
# Create with: kubectl create secret docker-registry ghcr-secret \
#   --docker-server=ghcr.io --docker-username=USERNAME \
#   --docker-password=TOKEN --docker-email=email@example.com \
#   -n kptest-production
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: kptest-production
  labels:
    app: kptest
    environment: production
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: BASE64_ENCODED_DOCKER_CONFIG
