apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kptest-backend-hpa
  namespace: kptest-production
  labels:
    app: kptest-backend
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kptest-backend
  minReplicas: 3
  maxReplicas: 10
  
  # Scaling behavior configuration
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
  
  # Metrics for scaling
  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    
    # Custom metric - requests per second (requires Prometheus Adapter)
    - type: Pods
      pods:
        metric:
          name: http_server_requests_seconds_count
        target:
          type: AverageValue
          averageValue: "100"
    
    # Custom metric - response latency (requires Prometheus Adapter)
    - type: Pods
      pods:
        metric:
          name: http_server_requests_seconds
          selector:
            matchLabels:
              quantile: "0.95"
        target:
          type: AverageValue
          averageValue: "1"
