apiVersion: apps/v1
kind: Deployment
metadata:
  name: kptest-backend
  namespace: kptest-production
  labels:
    app: kptest-backend
    version: v1
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kptest-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kptest-backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # Security Context - Pod Level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Service Account
      serviceAccountName: kptest-backend-sa
      
      # Image Pull Secrets
      imagePullSecrets:
        - name: ghcr-secret
      
      # Termination Grace Period
      terminationGracePeriodSeconds: 60
      
      # DNS Policy
      dnsPolicy: ClusterFirst
      
      # Affinity Rules
      affinity:
        # Spread pods across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: kptest-backend
                topologyKey: kubernetes.io/hostname
      
      # Containers
      containers:
        - name: kptest-backend
          image: ghcr.io/abdullzair/kptest-workspace/backend:v1.0.0
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          # Environment Variables from ConfigMap
          envFrom:
            - configMapRef:
                name: kptest-backend-config
          
          # Sensitive Environment Variables from Secret
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: JWT_SECRET
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: MAIL_PASSWORD
            - name: HIS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: HIS_API_KEY
          
          # Resource Requests and Limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          
          # Security Context - Container Level
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          
          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          
          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # Startup Probe (for slow starting containers)
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          
          # Volume Mounts
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          
          # Lifecycle Hooks
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      
      # Volumes
      volumes:
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
      
      # Topology Spread Constraints
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: kptest-backend
