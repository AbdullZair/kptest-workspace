apiVersion: apps/v1
kind: Deployment
metadata:
  name: kptest-frontend
  namespace: kptest-production
  labels:
    app: kptest-frontend
    version: v1
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kptest-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kptest-frontend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      # Security Context - Pod Level
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      
      # Service Account
      serviceAccountName: kptest-frontend-sa
      
      # Image Pull Secrets
      imagePullSecrets:
        - name: ghcr-secret
      
      # Termination Grace Period
      terminationGracePeriodSeconds: 30
      
      # Affinity Rules
      affinity:
        # Spread pods across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: kptest-frontend
                topologyKey: kubernetes.io/hostname
      
      # Containers
      containers:
        - name: kptest-frontend
          image: ghcr.io/abdullzair/kptest-workspace/frontend:v1.0.0
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          
          # Environment Variables from ConfigMap
          envFrom:
            - configMapRef:
                name: kptest-frontend-config
          
          # Resource Requests and Limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          # Security Context - Container Level
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Volume Mounts (read-only root filesystem)
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      
      # Volumes
      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 64Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
      
      # Topology Spread Constraints
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: kptest-frontend
