apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kptest-postgres-pvc
  namespace: kptest-production
  labels:
    app: kptest-postgres
    environment: production
  annotations:
    description: "Persistent storage for PostgreSQL database"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
  volumeMode: Filesystem
