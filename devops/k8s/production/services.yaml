apiVersion: v1
kind: Service
metadata:
  name: kptest-backend
  namespace: kptest-production
  labels:
    app: kptest-backend
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: kptest-backend

---
apiVersion: v1
kind: Service
metadata:
  name: kptest-frontend
  namespace: kptest-production
  labels:
    app: kptest-frontend
    environment: production
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: kptest-frontend

---
apiVersion: v1
kind: Service
metadata:
  name: kptest-postgres
  namespace: kptest-production
  labels:
    app: kptest-postgres
    environment: production
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: kptest-postgres

---
apiVersion: v1
kind: Service
metadata:
  name: kptest-redis
  namespace: kptest-production
  labels:
    app: kptest-redis
    environment: production
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: kptest-redis
