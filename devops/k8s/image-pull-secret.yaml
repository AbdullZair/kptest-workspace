# Image Pull Secret for GHCR
# Create this secret to allow Kubernetes to pull images from GitHub Container Registry
# 
# Usage:
# 1. Generate a GitHub Personal Access Token with 'read:packages' scope
# 2. Run: kubectl create secret docker-registry ghcr-secret \
#    --docker-server=ghcr.io \
#    --docker-username=<your-github-username> \
#    --docker-password=<your-pat> \
#    --docker-email=<your-email> \
#    -n kptest
#
# Or apply this template after base64 encoding your credentials:
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: kptest
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG
