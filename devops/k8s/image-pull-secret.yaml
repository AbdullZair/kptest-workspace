# Image Pull Secret for GHCR (GitHub Container Registry)
# This secret allows Kubernetes to pull images from ghcr.io
#
# Prerequisites:
# 1. GitHub Personal Access Token with 'read:packages' scope
# 2. GitHub username
#
# Quick Setup:
#   kubectl create secret docker-registry ghcr-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<your-github-username> \
#     --docker-password=<GHCR_TOKEN> \
#     --docker-email=<your-email> \
#     -n kptest
#
# Or generate the dockerconfigjson manually:
#   echo '{"auths":{"ghcr.io":{"username":"<username>","password":"<token>","email":"<email>","auth":"'$(echo -n "<username>:<token>" | base64 -w0)'"}}}' | base64 -w0
#
# Then replace the .dockerconfigjson value below with the output

apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: kptest
  labels:
    app: kptest
    component: image-pull
type: kubernetes.io/dockerconfigjson
data:
  # Replace with your base64-encoded dockerconfigjson
  # Format: echo '{"auths":{"ghcr.io":{"username":"<user>","password":"<token>","email":"<email>","auth":"<base64(user:token)>"}}}' | base64 -w0
  .dockerconfigjson: eyJhdXRocyI6eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoiIiwicGFzc3dvcmQiOiIiLCJlbWFpbCI6IiIsImF1dGgiOiIifX19
---
# Image Pull Secret for Docker Hub (optional)
# Use this if you pull images from Docker Hub that require authentication
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: kptest
  labels:
    app: kptest
    component: image-pull
type: kubernetes.io/dockerconfigjson
data:
  # Replace with your base64-encoded dockerconfigjson for Docker Hub
  .dockerconfigjson: eyJhdXRocyI6eyJkb2NrZXIuaW8iOnsidXNlcm5hbWUiOiIiLCJwYXNzd29yZCI6IiIsImVtYWlsIjoiIiwiYXV0aCI6IiJ9fX0=
