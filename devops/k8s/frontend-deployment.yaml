apiVersion: apps/v1
kind: Deployment
metadata:
  name: kptest-frontend
  namespace: kptest
  labels:
    app: kptest-frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kptest-frontend
  template:
    metadata:
      labels:
        app: kptest-frontend
        version: v1
    spec:
      containers:
        - name: kptest-frontend
          image: ghcr.io/abdullzair/kptest-workspace/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: kptest-config
                  key: api-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: kptest-frontend
  namespace: kptest
  labels:
    app: kptest-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: kptest-frontend
