apiVersion: v1
kind: ConfigMap
metadata:
  name: kptest-config
  namespace: kptest
  labels:
    app: kptest
data:
  # API Configuration
  api-url: "http://kptest-backend:8080/api"
  api-health-endpoint: "/api/v1/health"
  
  # Application Configuration
  app-name: "KPTEST Portal"
  app-version: "1.0.0"
  
  # Logging Configuration
  log-level: "INFO"
  log-format: "JSON"
  
  # Feature Flags
  feature-his-integration: "true"
  feature-email-notifications: "true"
  
  # Frontend Configuration
  vite-api-url: "http://localhost:8080/api"
  frontend-port: "3000"
  
  # Backend Configuration
  backend-port: "8080"
  backend-management-port: "8080"
  
  # Database Configuration (non-sensitive)
  db-port: "5432"
  db-name: "kptest"
  
  # Redis Configuration (non-sensitive)
  redis-port: "6379"
  
  # HIS Integration
  his-mock-url: "http://kptest-his-mock:8081"
