apiVersion: v1
kind: Secret
metadata:
  name: kptest-secrets
  namespace: kptest
type: Opaque
stringData:
  # Database credentials
  db-host: "kptest-postgres"
  db-name: "kptest"
  db-user: "kptest"
  db-password: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT secret key (generate a strong random key for production)
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_RANDOM_KEY"
  
  # Email configuration
  mail-host: "smtp.gmail.com"
  mail-username: "CHANGE_ME"
  mail-password: "CHANGE_ME"
  
  # HIS integration
  his-base-url: "https://his.example.com/api"
  
  # Redis (optional password)
  redis-password: ""
