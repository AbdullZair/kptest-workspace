apiVersion: apps/v1
kind: Deployment
metadata:
  name: kptest-backend
  namespace: kptest
  labels:
    app: kptest-backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kptest-backend
  template:
    metadata:
      labels:
        app: kptest-backend
        version: v1
    spec:
      containers:
        - name: kptest-backend
          image: ghcr.io/abdullzair/kptest-workspace/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Spring Configuration
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8080"
            
            # Database Configuration
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: db-password
            
            # JWT Configuration
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: jwt-secret
            
            # Redis Configuration
            - name: REDIS_HOST
              value: "kptest-redis"
            - name: REDIS_PORT
              value: "6379"
            
            # Email Configuration
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: mail-host
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: mail-username
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: mail-password
            
            # HIS Integration
            - name: HIS_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: kptest-secrets
                  key: his-base-url
            
            # API URL from ConfigMap
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: kptest-config
                  key: api-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kptest-backend
  namespace: kptest
  labels:
    app: kptest-backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: kptest-backend
